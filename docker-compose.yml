services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
      TZ: America/Mexico_City
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
      - ./docker/postgres/init_sales_db.sql:/docker-entrypoint-initdb.d/init_sales_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://superset:superset@postgres:5432/superset?sslmode=disable
      TZ: America/Mexico_City
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    links:
      - postgres
    deploy:
      resources:
        limits:
          memory: 256M
  valkey:
    image: valkey/valkey:9.0.3
    environment:
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: valkey-server --appendonly yes
    volumes:
      - ./valkey_data:/data

  cube:
    image: cubejs/cube:v1.6.19
    ports:
      - "4000:4000"
      - "15432:15432"
    environment:
      - CUBEJS_CACHE_AND_QUEUE_DRIVER=cubestore
      - CUBEJS_API_SECRET=${SECRET_KEY}
      - CUBEJS_DEV_MODE=true
      - CUBEJS_SQL_USER=superset
      - CUBEJS_SQL_PASSWORD=superset
      - CUBEJS_PG_SQL_PORT=15432
      - CUBEJS_STATSD_URL=statsd://statsd-exporter:9125
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
      # Multi-source Configuration
      - CUBEJS_DATASOURCES=default,extra_postgres
      # Default Source (Internal Config)
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_DB_HOST=postgres
      - CUBEJS_DB_NAME=sales_data
      - CUBEJS_DB_USER=superset
      - CUBEJS_DB_PASS=superset
      # Extra Source (External Placeholder)
      - CUBEJS_DS_EXTRA_POSTGRES_DB_TYPE=postgres
      - CUBEJS_DS_EXTRA_POSTGRES_DB_HOST=10.4.3.23
      - CUBEJS_DS_EXTRA_POSTGRES_DB_NAME=dw
      - CUBEJS_DS_EXTRA_POSTGRES_DB_USER=superset_user
      - CUBEJS_DS_EXTRA_POSTGRES_DB_PASS=L5upMXEjhdU0pajcGttf
    volumes:
      - ./cube_schema:/cube/conf/model
    depends_on:
      - postgres
      - valkey
    deploy:
      resources:
        limits:
          memory: 4G

  superset:
    build: 
      context: ./docker/superset
      args:
        PYPI_MIRROR: ${PYPI_MIRROR:-https://pypi.org/simple/}
    image: custom-superset:latest
    environment:
      - SUPERSET_ENV=production
      - SERVER_WORKER_AMOUNT=5
      - SUPERSET_LOAD_EXAMPLES=no
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - ENABLE_PROXY_FIX=true
      - APP_RLS=true
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ROW_LIMIT=${ROW_LIMIT}
      - SUPERSET_WEBSERVER_PORT=${SUPERSET_WEBSERVER_PORT}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_OPENID_REALM=${OIDC_OPENID_REALM}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - ALERT_REPORTS_WORKER_USERNAME=${ALERT_REPORTS_WORKER_USERNAME}
      - WEBDRIVER_BASEURL=${WEBDRIVER_BASEURL}
      - SECRET_KEY=${SECRET_KEY}
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - ./custom_security_manager.py:/app/pythonpath/custom_security_manager.py
      - ./superset_assets:/app/superset/static/custom:ro
      - superset_home:/app/superset_home
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  celery-worker:
    image: custom-superset:latest
    command: celery --app=superset.tasks.celery_app:app worker --concurrency=4 --loglevel=INFO
    environment:
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
      - ROW_LIMIT=${ROW_LIMIT}
      - SUPERSET_WEBSERVER_PORT=${SUPERSET_WEBSERVER_PORT}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_OPENID_REALM=${OIDC_OPENID_REALM}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - ALERT_REPORTS_WORKER_USERNAME=${ALERT_REPORTS_WORKER_USERNAME}
      - WEBDRIVER_BASEURL=${WEBDRIVER_BASEURL}
      - SECRET_KEY=${SECRET_KEY}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - ./custom_security_manager.py:/app/pythonpath/custom_security_manager.py
      - ./superset_assets:/app/superset/static/custom:ro
      - superset_home:/app/superset_home
    depends_on:
      - superset
    healthcheck:
      disable: true

  celery-beat:
    image: custom-superset:latest
    command: celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid --schedule /tmp/celerybeat-schedule
    environment:
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
      - SECRET_KEY=${SECRET_KEY}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - ./custom_security_manager.py:/app/pythonpath/custom_security_manager.py
      - ./superset_assets:/app/superset/static/custom:ro
      - superset_home:/app/superset_home
    depends_on:
      - superset
    healthcheck:
      disable: true

  prefect:
    build:
      context: ./docker/prefect
      args:
        PYPI_MIRROR: ${PYPI_MIRROR:-https://pypi.org/simple/}
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - ./prefect_flows:/opt/prefect/flows
      - ./prefect_data:/root/.prefect


  prometheus:
    image: prom/prometheus:v3.10.0
    user: root
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command: --config.file=/etc/prometheus/prometheus.yml --web.external-url=/prometheus/
    environment:
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true

  grafana:
    image: grafana/grafana:12.4.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
      - DOCKER_API_VERSION=1.44
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command: --url_base_prefix=/cadvisor
    depends_on:
      - valkey

  statsd-exporter:
    image: prom/statsd-exporter:v0.29.0
    container_name: statsd-exporter
    ports:
      - "9102:9102"
      - "9125:9125/udp"
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    ports:
      - "8001:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
    command: start-dev

  nginx:
    image: nginx:1.28.2
    ports:
      - "80:80"
    environment:
      - TZ=America/Mexico_City
      - ENABLE_PROXY_FIX=true
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - superset
      - prefect
      - grafana
      - keycloak
      - prometheus
      - cube
      - cadvisor

  superset-mcp:
    build: 
      context: ./superset-mcp
    environment:
      - SUPERSET_BASE_URL=http://superset:8088
      - SUPERSET_USERNAME=admin
      - SUPERSET_PASSWORD=admin
      - MCP_TRANSPORT=sse
      - MCP_PORT=8010
      - TZ=America/Mexico_City
    ports:
      - "8010:8010"
    depends_on:
      - superset

  flowise:
    image: flowiseai/flowise:latest
    environment:
      - PORT=3001
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - SECRETKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise
      - TZ=America/Mexico_City
    ports:
      - "3001:3001"
    volumes:
      - flowise_data:/root/.flowise
    restart: always

  vanna-ai:
    build:
      context: ./vanna-ai
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=superset
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8011:8011"
    volumes:
      - vanna_data:/app/vanna_db
    depends_on:
      - postgres

volumes:
  postgres_data:
  superset_home:
    name: superset-project_superset_home
  grafana_data:
  flowise_data:
  vanna_data:
